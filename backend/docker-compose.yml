# Docker Compose — spins up all the infrastructure services
# Run: docker-compose up -d
#
# Services:
#   postgres → main database (stores users, conversations, document metadata)
#   redis    → caching + WebSocket channel layer + Celery broker
#
# The Django server itself runs outside Docker in development (python manage.py runserver)
# In production, you'd add a 'web' service here too.

version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: pip_postgres
    environment:
      POSTGRES_DB: pip_support
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pip_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
